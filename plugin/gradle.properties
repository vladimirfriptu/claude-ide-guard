# JDK 21 installed via `brew install openjdk@21` (keg-only, not on PATH),
# so we point Gradle at it explicitly. Change this if your JDK 21 lives elsewhere.
org.gradle.java.home=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home

org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
org.gradle.caching=true
org.gradle.configuration-cache=false

# The IntelliJ Platform provides kotlin-stdlib at runtime; don't bundle our own.
kotlin.stdlib.default.dependency=false
